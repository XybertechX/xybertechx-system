<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Historial POS - XyberTechX</title>
  <link rel="stylesheet" href="../css/estilos.css">
  <link rel="stylesheet" href="../css/pos.css">
</head>
<body>

<div class="pos-layout">

  <aside class="pos-sidebar">
    <img src="../img/logo 2.0.png" alt="XyberTechX" class="pos-logo">
    <h2>XyberTechX</h2>
    <p>Historial POS</p>

    <nav>
      <a href="index.html">Nueva venta</a>
      <a href="historial.html" class="active">Historial</a>
      <a href="devoluciones.html">Devoluciones</a>
      <button type="button" onclick="logout()">Salir</button>
    </nav>
  </aside>

  <main class="pos-main">
    <header class="pos-header">
      <div>
        <h1>Historial de Ventas</h1>
        <p>Consulta tickets, metodos de pago y ventas devueltas.</p>
      </div>
      <span class="pos-badge">Vendedor</span>
    </header>

    <section class="pos-metrics">
      <div>
        <span>Total mostrado</span>
        <strong id="historialTotal">S/0.00</strong>
      </div>
      <div>
        <span>Tickets</span>
        <strong id="historialTickets">0</strong>
      </div>
      <div>
        <span>Devueltas</span>
        <strong id="historialDevueltas">0</strong>
      </div>
    </section>

    <section class="productos-panel">
      <div class="historial-filtros">
        <div>
          <label for="fechaInicio">Desde</label>
          <input type="date" id="fechaInicio">
        </div>

        <div>
          <label for="fechaFin">Hasta</label>
          <input type="date" id="fechaFin">
        </div>

        <div>
          <label for="metodoFiltro">Metodo</label>
          <select id="metodoFiltro">
            <option value="">Todos</option>
            <option value="Efectivo">Efectivo</option>
            <option value="Yape">Yape</option>
            <option value="Plin">Plin</option>
            <option value="Transferencia">Transferencia</option>
            <option value="Tarjeta">Tarjeta</option>
          </select>
        </div>

        <button id="btnFiltrarFechas">Buscar</button>
        <button id="btnLimpiarFiltro" type="button">Ultimas ventas</button>
      </div>

      <div id="historialPOS" class="historial-pos">
        <p>Cargando ventas...</p>
      </div>
    </section>
  </main>

</div>

<script type="module" src="../js/auth.js"></script>
<script type="module" src="../js/logout.js"></script>
<script type="module" src="../js/pos/historial.js"></script>

</body>
</html>
