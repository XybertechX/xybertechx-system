<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Devoluciones - XyberTechX</title>
  <link rel="stylesheet" href="../css/estilos.css">
  <link rel="stylesheet" href="../css/pos.css">
</head>
<body>

<div class="pos-layout">

  <aside class="pos-sidebar">
    <img src="../img/logo 2.0.png" alt="XyberTechX" class="pos-logo">
    <h2>XyberTechX</h2>
    <p>POS de ventas</p>

    <nav>
      <a href="index.html">Nueva venta</a>
      <a href="historial.html">Historial</a>
      <a href="devoluciones.html" class="active">Devoluciones</a>
      <button type="button" onclick="logout()">Salir</button>
    </nav>
  </aside>

  <main class="pos-main">

    <header class="pos-header">
      <div>
        <h1>Devoluciones</h1>
        <p>Restaura stock y marca ventas POS como devueltas.</p>
      </div>
      <span class="pos-badge">Vendedor</span>
    </header>

    <section class="pos-metrics">
      <div>
        <span>Ventas disponibles</span>
        <strong id="devolucionesDisponibles">0</strong>
      </div>
      <div>
        <span>Total mostrado</span>
        <strong id="devolucionesTotal">S/0.00</strong>
      </div>
      <div>
        <span>Busqueda</span>
        <strong id="devolucionesCoincidencias">0</strong>
      </div>
    </section>

    <section class="productos-panel">
      <div class="panel-title pos-tools">
        <div>
          <h2>Ventas para devolucion</h2>
          <p>Se muestran las ultimas ventas POS completadas.</p>
        </div>
        <input type="text" id="buscarDevolucion" placeholder="Buscar por ticket o producto...">
      </div>

      <div id="listaDevoluciones" class="devoluciones-lista">
        <p class="carrito-vacio">Cargando ventas...</p>
      </div>
    </section>

  </main>

</div>

<script type="module" src="../js/auth.js"></script>
<script type="module" src="../js/logout.js"></script>
<script type="module" src="../js/pos/devoluciones.js"></script>

</body>
</html>
