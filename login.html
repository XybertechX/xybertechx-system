<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login - XyberTechX</title>
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

<div class="login-premium">

  <section class="login-brand">
    <img src="img/logo 2.0.png" alt="XyberTechX">
    <h1>XyberTechX Technology</h1>
    <p class="slogan">Tecnología que responde.</p>
    <p class="descripcion">
      Accede al sistema interno para gestionar ventas, inventario, reportes y cotizaciones.
    </p>
  </section>

  <section class="login-box">
    <h2>Bienvenido</h2>
    <p>Ingresa tus credenciales para continuar.</p>

    <input id="email" type="email" placeholder="Correo electrónico">
    <input id="password" type="password" placeholder="Contraseña">

    <button onclick="login()">Ingresar al sistema</button>

    <span class="login-footer">Sistema privado de XyberTechX</span>
  </section>

</div>

<script type="module" src="js/login.js"></script>

</body>
</html>
